# Sideproject 標準 secret-scan workflow（治理規則：所有有 remote 的 repo 必備）
# 用法：整檔複製到 <repo>/.github/workflows/secret-scan.yml，不需修改。
# 母版來源：shopee-affiliate-tool ci.yml 的 secret-scan job（釘版本＋checksum 驗證）。
# 與本機 pre-commit hook（.githooks/pre-commit）互為表裡：hook 擋提交、CI 擋 --no-verify 繞過。
name: secret-scan

on:
  push:
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0  # 全歷史掃描
      - name: Install gitleaks (pinned + checksum verified)
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          set -euo pipefail
          ASSET="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          BASE="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -sSLf -o "$ASSET" "$BASE/$ASSET"
          curl -sSLf -o checksums.txt "$BASE/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          sha256sum --ignore-missing -c checksums.txt
          tar -xzf "$ASSET" gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: gitleaks scan (full history)
        run: |
          # repo 有自己的 .gitleaks.toml 就用（可含專案 allowlist），沒有就用內建規則
          if [ -f .gitleaks.toml ]; then
            gitleaks git --redact -c .gitleaks.toml
          else
            gitleaks git --redact
          fi
