name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Three-job pattern so a matrix build can't race into duplicate draft releases
# or split the updater `latest.json`:
#   1. create-release  — make ONE draft release, output its id
#   2. build-tauri      — every platform uploads to that release id; tauri-action
#                         merges each platform's signature into one latest.json
#   3. publish-release  — flip the release out of draft once all builds succeed
jobs:
  create-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const isTag = context.ref.startsWith('refs/tags/');
            const tag = isTag
              ? context.ref.replace('refs/tags/', '')
              : `v0.0.0-ci.${context.runNumber}`;
            const name = isTag ? `Keytainer ${tag}` : `dry-run ${tag}`;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name,
              body: [
                'See README for install instructions.',
                'Linux: `.deb` or `.AppImage`. Windows: `-setup.exe`. macOS: `.dmg`.',
                'macOS / Windows binaries are **unsigned** — Gatekeeper / SmartScreen',
                'will warn on first launch. See README for the bypass steps.',
              ].join('\n'),
              draft: true,
              prerelease: false,
            });
            return data.id;

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build & upload to the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Upload to the single release created above (by id, not by tag) so
          # the matrix can't fork into duplicate releases, and so each
          # platform's updater signature is merged into one latest.json.
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Publish the release (undraft)
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
